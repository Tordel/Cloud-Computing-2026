runtime: aspnetcore
env: flex
runtime_config:
  operating_system: ubuntu22
  runtime_version: "8"

env_variables:
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:${PORT}

automatic_scaling:
  min_num_instances: 1
  max_num_instances: 5
  cpu_utilization:
    target_utilization: 0.65

entrypoint: dotnet CloudNote.dll --urls http://+:${PORT}